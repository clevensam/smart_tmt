<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUST UE Timetable Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #e8f0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: 60px;
        }
        .coffee-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(135deg, #18512f 0%, #2a8f52 100%);
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .coffee-banner:hover {
            background: linear-gradient(135deg, #134428 0%, #1e7a40 100%);
        }
        .coffee-banner .coffee-icon {
            font-size: 1.2rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 520px;
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            color: #18512f;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: #18512f;
            margin-bottom: 4px;
        }
        .logo span { color: #2c6e8f; }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 2px solid #18512f;
        }
        .tab {
            flex: 1;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #e8f0e8;
            color: #18512f;
            border: none;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            border-radius: 8px 8px 0 0;
        }
        .tab.active {
            background: #18512f;
            color: white;
        }
        .tab:not(.active):hover {
            background: #d0e0d0;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #18512f; }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            background: #18512f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        button:hover { background: #134428; }
        button:disabled {
            background: #999;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
            text-align: left;
        }
        .result.success {
            display: block;
            background: #e8f5e9;
            border: 1px solid #18512f;
        }
        .result.error {
            display: block;
            background: #ffebee;
            border: 1px solid #ffcdd2;
            color: #c62828;
        }
        .result .student-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #18512f;
            margin-bottom: 4px;
        }
        .result .student-info {
            color: #555;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            background: white;
            color: #18512f;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 2px solid #18512f;
        }
        .view-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            background: #2c6e8f;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
        }
        .btn-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.78rem;
        }
        .venue-group {
            margin-bottom: 16px;
            border: 1px solid #18512f;
            border-radius: 8px;
            overflow: hidden;
        }
        .venue-header {
            background: #18512f;
            color: white;
            padding: 10px 14px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .venue-header .venue-meta {
            font-weight: 400;
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .venue-count {
            font-weight: 400;
            font-size: 0.8rem;
            opacity: 0.85;
        }
        .venue-students {
            padding: 8px 0;
        }
        .venue-student {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            font-size: 0.85rem;
            border-bottom: 1px solid #e8f0e8;
            gap: 8px;
            flex-wrap: wrap;
        }
        .venue-student:last-child { border-bottom: none; }
        .venue-student .v-name { font-weight: 600; color: #1a1a1a; }
        .venue-student .v-prog { color: #666; font-size: 0.8rem; }
        .course-info {
            text-align: center;
            margin-bottom: 16px;
            color: #18512f;
            font-weight: 600;
            font-size: 1.05rem;
        }
        .footer {
            margin-top: 24px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #18512f;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px; right: 16px;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }
        .modal-close:hover { color: #333; }
        .modal h2 {
            color: #18512f;
            font-size: 1.2rem;
            margin-bottom: 4px;
        }
        .modal .modal-sub {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .modal .form-group {
            margin-bottom: 14px;
        }
        .modal .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
        }
        .modal .form-group input {
            width: 100%;
            padding: 10px 14px;
            font-size: 0.95rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal .form-group input:focus { border-color: #18512f; }
        .modal .donate-btn {
            width: 100%;
            padding: 12px;
            background: #18512f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }
        .modal .donate-btn:hover { background: #134428; }
        .modal .donate-btn:disabled { background: #999; cursor: not-allowed; }
        .modal .donate-status {
            text-align: center;
            margin-top: 16px;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .modal .donate-status.pending {
            display: block;
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            color: #e65100;
        }
        .modal .donate-status.success {
            display: block;
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: #1b5e20;
        }
        .modal .donate-status.error {
            display: block;
            background: #ffebee;
            border: 1px solid #ffcdd2;
            color: #c62828;
        }
        .modal .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 3px solid #e65100;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) {
            body { padding: 10px; padding-top: 56px; }
            .card { padding: 20px; }
            h1 { font-size: 1.25rem; }
            .logo { font-size: 1.5rem; }
            .tab { font-size: 0.72rem; padding: 8px 4px; }
            .input-group { flex-direction: column; }
            .input-group button { width: 100%; }
            .venue-header { flex-direction: column; text-align: center; gap: 6px; }
            .modal { padding: 24px; margin: 10px; }
        }
    </style>
</head>
<body>
    <div class="coffee-banner" onclick="openCoffeeModal()">
        <span class="coffee-icon">☕</span>
        <span>Buy Mopao a Coffee</span>
    </div>

    <div class="modal-overlay" id="coffeeModal">
        <div class="modal">
            <button class="modal-close" onclick="closeCoffeeModal()">&times;</button>
            <h2>☕ Buy Mopao a Coffee</h2>
            <p class="modal-sub">Support the developer with a small donation via mobile money</p>
            <div class="form-group">
                <label for="donorName">Your Name (optional)</label>
                <input type="text" id="donorName" placeholder="e.g. John Doe">
            </div>
            <div class="form-group">
                <label for="donorPhone">Phone Number</label>
                <input type="tel" id="donorPhone" placeholder="255712345678" pattern="255[0-9]{9}" maxlength="12" required>
            </div>
            <div class="form-group">
                <label for="donorAmount">Amount (TZS)</label>
                <input type="number" id="donorAmount" placeholder="e.g. 2000" min="100" required>
            </div>
            <button class="donate-btn" id="donateBtn" onclick="initiateDonation()">Send Payment</button>
            <div class="donate-status" id="donateStatus"></div>
        </div>
    </div>

    <div class="card">
        <div class="logo">M<span>U</span>ST</div>
        <h1>UE Timetable Downloader</h1>

        <div class="tabs">
            <button class="tab active" data-tab="download">Download UE Timetable</button>
            <button class="tab" data-tab="venues">Venue Sharing</button>
        </div>

        <div id="tab-download" class="tab-content active">
            <p class="subtitle">Enter your registration number to download your UE timetable</p>
            <form id="searchForm" novalidate>
                <div class="input-group">
                    <input type="text" id="regno" name="regno" placeholder="e.g. 25100534760075" pattern="[0-9]{14}" title="Registration number must be exactly 14 digits" required autocomplete="off">
                    <button type="submit" id="submitBtn">Search</button>
                </div>
            </form>
            <div class="result" id="result">
                <div class="student-name" id="studentName"></div>
                <div class="student-info" id="studentInfo"></div>
                <a href="#" class="download-btn" id="viewLink" style="display:none" target="_blank"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> View</a>
                    <a href="#" class="view-btn" id="downloadLink" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download</a>
            </div>
        </div>

        <div id="tab-venues" class="tab-content">
            <p class="subtitle">Enter a course code to see which students share a venue</p>
            <form id="venueForm" novalidate>
                <div class="input-group">
                    <input type="text" id="courseCode" placeholder="e.g. CS 8115" pattern="[A-Za-z]{2,4}\s+\d{4}" title="Course code format: 2-4 letters followed by a space and 4 digits (e.g., CS 8115)" required autocomplete="off">
                    <button type="submit" id="venueBtn">Find</button>
                </div>
            </form>
            <div class="result" id="venueResult"></div>
        </div>

        <div class="footer">Developed by Mopao and MSS</div>
    </div>

    <script>
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // Download timetable tab
        const form = document.getElementById('searchForm');
        const regnoInput = document.getElementById('regno');
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const studentName = document.getElementById('studentName');
        const studentInfo = document.getElementById('studentInfo');
        const downloadLink = document.getElementById('downloadLink');
        const viewLink = document.getElementById('viewLink');

        const REGNO_PATTERN = /^\d{14}$/;
        const COURSE_PATTERN = /^[A-Za-z]{2,4}\s+\d{4}$/;

        regnoInput.addEventListener('input', () => {
            const val = regnoInput.value.trim();
            if (val && !REGNO_PATTERN.test(val)) {
                regnoInput.setCustomValidity('Reg No must be exactly 14 digits');
            } else {
                regnoInput.setCustomValidity('');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            resultDiv.className = 'result';
            resultDiv.style.display = 'none';
            downloadLink.style.display = 'none';
            viewLink.style.display = 'none';

            const regno = regnoInput.value.trim();
            if (!regno) return;

            if (!REGNO_PATTERN.test(regno)) {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                studentName.textContent = '';
                studentInfo.textContent = 'Invalid format: Registration number must be exactly 14 digits (e.g., 25100534760075)';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Searching...';

            try {
                const resp = await fetch(`/api/lookup/${encodeURIComponent(regno)}`);
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Not found');
                }
                const data = await resp.json();
                studentName.textContent = data.name;
                studentInfo.textContent = data.programme;
                const params = new URLSearchParams({ regno });
                downloadLink.href = '/download?' + params;
                viewLink.href = '/view?' + params;
                downloadLink.style.display = 'inline-block';
                viewLink.style.display = 'inline-block';
                resultDiv.className = 'result success';
                resultDiv.style.display = 'block';
            } catch (err) {
                studentName.textContent = '';
                studentInfo.textContent = err.message;
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Search';
            }
        });

        // Venue sharing tab
        const venueForm = document.getElementById('venueForm');
        const courseInput = document.getElementById('courseCode');
        const venueBtn = document.getElementById('venueBtn');
        const venueResult = document.getElementById('venueResult');

        courseInput.addEventListener('input', () => {
            const val = courseInput.value.trim();
            if (val && !COURSE_PATTERN.test(val)) {
                courseInput.setCustomValidity('Format: 2-4 letters + space + 4 digits (e.g., CS 8115)');
            } else {
                courseInput.setCustomValidity('');
            }
        });

        venueForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            venueResult.className = 'result';
            venueResult.style.display = 'none';

            const course = courseInput.value.trim();
            if (!course) return;

            if (!COURSE_PATTERN.test(course)) {
                venueResult.className = 'result error';
                venueResult.style.display = 'block';
                venueResult.textContent = 'Invalid format: Course code must be 2-4 letters followed by a space and 4 digits (e.g., CS 8115)';
                return;
            }

            venueBtn.disabled = true;
            venueBtn.textContent = 'Searching...';

            try {
                const resp = await fetch('/api/venue-share?' + new URLSearchParams({ course }));
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Not found');
                }
                const data = await resp.json();

                let html = '<div class="course-info">' + data.course_code + ' &mdash; ' + data.course_name + '</div>';
                data.venues.forEach(v => {
                    const params = new URLSearchParams({ course, venue: v.venue });
                    html += '<div class="venue-group">';
                    html += '<div class="venue-header">';
                    html += '<strong>Venue: ' + v.venue + ' <span class="venue-count">(' + v.students.length + ' students)</span></strong>';
                    html += '<div class="btn-group">';
                    html += '<a href="/api/venue-share/view?' + params + '" class="download-btn btn-sm" target="_blank"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> View</a>';
                    html += '<a href="/api/venue-share/download?' + params + '" class="view-btn btn-sm"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download</a>';
                    html += '</div>';
                    html += '</div>';
                    html += '<div style="padding:8px 14px;text-align:left;font-size:0.85rem;color:#666;">';
                    html += v.exam_date + ' &bull; ' + v.time_slot;
                    html += '</div>';
                    html += '</div>';
                });

                venueResult.innerHTML = html;
                venueResult.className = 'result success';
                venueResult.style.display = 'block';
            } catch (err) {
                venueResult.innerHTML = '';
                venueResult.textContent = err.message;
                venueResult.className = 'result error';
                venueResult.style.display = 'block';
            } finally {
                venueBtn.disabled = false;
                venueBtn.textContent = 'Find';
            }
        });
        // ─── Coffee Donation Modal ──────────────────────────────────────
        const coffeeModal = document.getElementById('coffeeModal');
        const donateStatus = document.getElementById('donateStatus');
        const donateBtn = document.getElementById('donateBtn');
        let pollTimer = null;

        function openCoffeeModal() {
            coffeeModal.classList.add('active');
        }
        function closeCoffeeModal() {
            coffeeModal.classList.remove('active');
            donateStatus.className = 'donate-status';
            donateStatus.style.display = 'none';
            donateBtn.disabled = false;
            donateBtn.textContent = 'Send Payment';
            document.getElementById('donorName').value = '';
            document.getElementById('donorPhone').value = '';
            document.getElementById('donorAmount').value = '';
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        }
        coffeeModal.addEventListener('click', (e) => {
            if (e.target === coffeeModal) closeCoffeeModal();
        });

        async function initiateDonation() {
            const name = document.getElementById('donorName').value.trim();
            const phone = document.getElementById('donorPhone').value.trim();
            const amount = document.getElementById('donorAmount').value.trim();

            if (!phone || !/^255\d{9}$/.test(phone)) {
                donateStatus.className = 'donate-status error';
                donateStatus.textContent = 'Phone must be in format 255XXXXXXXXX';
                donateStatus.style.display = 'block';
                return;
            }
            if (!amount || parseInt(amount) < 100) {
                donateStatus.className = 'donate-status error';
                donateStatus.textContent = 'Minimum donation is 100 TZS';
                donateStatus.style.display = 'block';
                return;
            }

            donateBtn.disabled = true;
            donateBtn.textContent = 'Sending...';
            donateStatus.className = 'donate-status pending';
            donateStatus.innerHTML = '<span class="spinner"></span> Initiating payment...';
            donateStatus.style.display = 'block';

            try {
                const resp = await fetch('/api/donate/initiate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, amount: parseInt(amount) }),
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Failed to initiate payment');
                }
                const data = await resp.json();

                if (data.status === 'SUCCESS') {
                    donateStatus.className = 'donate-status success';
                    donateStatus.textContent = 'Payment successful! Thank you for the coffee ☕';
                    setTimeout(closeCoffeeModal, 4000);
                    return;
                }

                donateStatus.className = 'donate-status pending';
                donateStatus.innerHTML = '<span class="spinner"></span> Check your phone to enter your PIN...';
                startPolling(data.orderReference);
            } catch (err) {
                donateStatus.className = 'donate-status error';
                donateStatus.textContent = err.message;
                donateBtn.disabled = false;
                donateBtn.textContent = 'Send Payment';
            }
        }

        function startPolling(orderRef) {
            if (pollTimer) clearInterval(pollTimer);
            let attempts = 0;
            pollTimer = setInterval(async () => {
                attempts++;
                if (attempts > 30) {
                    clearInterval(pollTimer);
                    pollTimer = null;
                    donateStatus.className = 'donate-status error';
                    donateStatus.textContent = 'Payment timed out. Please try again.';
                    donateBtn.disabled = false;
                    donateBtn.textContent = 'Send Payment';
                    return;
                }
                try {
                    const resp = await fetch('/api/donate/status/' + orderRef);
                    const data = await resp.json();
                    if (data.status === 'SUCCESS' || data.status === 'SETTLED') {
                        clearInterval(pollTimer);
                        pollTimer = null;
                        donateStatus.className = 'donate-status success';
                        donateStatus.textContent = 'Payment successful! Thank you for the coffee ☕';
                        setTimeout(closeCoffeeModal, 4000);
                    } else if (data.status === 'FAILED') {
                        clearInterval(pollTimer);
                        pollTimer = null;
                        donateStatus.className = 'donate-status error';
                        donateStatus.textContent = 'Payment failed. Please try again.';
                        donateBtn.disabled = false;
                        donateBtn.textContent = 'Send Payment';
                    }
                } catch (e) {
                    // keep polling on network errors
                }
            }, 3000);
        }
    </script>
</body>
</html>
